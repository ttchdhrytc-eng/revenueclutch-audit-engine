<script>

let auditResults = [];

let chartInstance = null;

async function analyzeDomains(){

  const textarea =
    document.getElementById("domains");

  const domains =
    textarea.value
      .split("\n")
      .map(d => d.trim())
      .filter(Boolean);

  const tbody =
    document.querySelector("#resultsTable tbody");

  tbody.innerHTML = "";

  auditResults = [];

  for(const domain of domains){

    try{

      const response = await fetch(
        "https://audit-api.t-tchdhry-tc.workers.dev/?domain=" + domain
      );

      const text = await response.text();

      console.log(text);

      const data = JSON.parse(text);

      auditResults.push(data);

      let scoreClass = "score-good";

      if(data.score < 80){
        scoreClass = "score-mid";
      }

      if(data.score < 50){
        scoreClass = "score-bad";
      }

      tbody.innerHTML += `
        <tr>
          <td>${data.domain || ""}</td>
          <td>${data.title || ""}</td>
          <td>${data.description || ""}</td>
          <td>${data.h1 || ""}</td>
          <td class="${scoreClass}">
            ${data.score || ""}
          </td>
          <td>${data.ai || ""}</td>
        </tr>
      `;

    }catch(err){

      console.log(err);

      tbody.innerHTML += `
        <tr>
          <td colspan="6">
            ${err}
          </td>
        </tr>
      `;

    }

  }

  updateDashboardStats();

  renderChart();

}

function updateDashboardStats(){

  if(auditResults.length === 0) return;

  document.getElementById("totalAudits")
    .innerText = auditResults.length;

  const scores =
    auditResults.map(r => Number(r.score || 0));

  const avg =
    Math.round(
      scores.reduce((a,b)=>a+b,0)
      / scores.length
    );

  const best =
    Math.max(...scores);

  document.getElementById("avgScore")
    .innerText = avg;

  document.getElementById("bestScore")
    .innerText = best;

}

function renderChart(){

  const ctx =
    document.getElementById("scoreChart");

  const labels =
    auditResults.map(r => r.domain);

  const scores =
    auditResults.map(r => r.score);

  if(chartInstance){
    chartInstance.destroy();
  }

  chartInstance = new Chart(ctx, {

    type: 'bar',

    data: {
      labels,
      datasets: [{
        label: 'SEO Score',
        data: scores
      }]
    },

    options: {
      responsive:true,
      maintainAspectRatio:false
    }

  });

}

function downloadCSV(){

  if(auditResults.length === 0){
    alert("No results");
    return;
  }

  const headers = [
    "Domain",
    "Title",
    "Description",
    "H1",
    "Score",
    "AI"
  ];

  const rows = auditResults.map(r => [
    r.domain,
    r.title,
    r.description,
    r.h1,
    r.score,
    (r.ai || "").replace(/\n/g, " ")
  ]);

  let csv =
    headers.join(",") + "\n";

  rows.forEach(row => {

    csv += row.map(v =>
      `"${String(v || "").replace(/"/g,'""')}"`
    ).join(",") + "\n";

  });

  const blob =
    new Blob([csv], { type:"text/csv" });

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;

  a.download = "audit-results.csv";

  a.click();

  URL.revokeObjectURL(url);

}

async function loadHistory(){

  try{

    const response = await fetch(
      "https://audit-api.t-tchdhry-tc.workers.dev/?history=1"
    );

    const data = await response.json();

    const tbody =
      document.querySelector("#historyTable tbody");

    tbody.innerHTML = "";

    // SHOW ONLY LAST 5
    data.slice(0,5).forEach(row => {

      tbody.innerHTML += `
        <tr>
          <td>${row.domain || ""}</td>
          <td>${row.score || ""}</td>
          <td>${row.ai || ""}</td>
          <td>${row.created_at || ""}</td>
        </tr>
      `;

    });

  }catch(err){

    console.log(err);

  }

}

loadHistory();

</script>
