<!DOCTYPE html>
<html>
<head>
<title>Revenue Clutch Audit Engine</title>
<style>
body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:40px;
}

textarea{
width:100%;
height:200px;
}

button{
padding:12px 20px;
margin-top:20px;
}
</style>
</head>

<body>

<h1>Revenue Clutch Audit Engine</h1>

<p>Paste Domains:</p>

<textarea id="domains"></textarea>

<button onclick="analyze()">
Analyze
</button>

<div id="results"></div>

<script>

async function analyze(){

const domains =
document
.getElementById("domains")
.value
.split("\n");

let html = "";

for(const domain of domains){

try{

const response =
await fetch(
"https://audit-api.t-tchdhry-tc.workers.dev/?domain="
+ domain.trim()
);

const data =
await response.json();

html += `
<div style="border:1px solid #ddd;padding:15px;margin:15px 0">
<h3>${data.domain}</h3>
<p><b>SEO Score:</b> ${data.score}</p>
<p><b>Title:</b> ${data.title}</p>
<p><b>Description:</b> ${data.description}</p>
<p><b>H1:</b> ${data.h1}</p>
</div>
`;

}catch(e){

html += `
<div>
Error: ${domain}
</div>
`;

}

}

document
.getElementById("results")
.innerHTML = html;

}

</script>

</body>
</html>
