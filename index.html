<script>

let auditResults = [];
let chartInstance = null;

const API_BASE =
  "https://audit-api.t-tchdhry-tc.workers.dev";

function sanitize(value){

  if(value === null || value === undefined){
    return "";
  }

  return String(value)
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");

}

function getScoreClass(score){

  if(score >= 85){
    return "score-good";
  }

  if(score >= 60){
    return "score-mid";
  }

  return "score-bad";

}

function getGrade(score){

  if(score >= 90){
    return "A+";
  }

  if(score >= 80){
    return "B";
  }

  if(score >= 60){
    return "C";
  }

  return "D";

}

async function analyzeDomains(){

  const textarea =
    document.getElementById("domains");

  const domains =
    [...new Set(
      textarea.value
        .split("\n")
        .map(d => d.trim().toLowerCase())
        .filter(Boolean)
    )];

  if(domains.length === 0){

    alert("Please enter at least one domain");

    return;

  }

  auditResults = [];

  document.querySelector("#resultsTable tbody")
    .innerHTML = "";

  updateDashboard();

  const loadingBox =
    document.getElementById("loadingBox");

  loadingBox.style.display = "flex";

  document.getElementById("loadingTitle")
    .innerText =
      "Analyzing Domains";

  let completed = 0;

  const promises = domains.map(async(domain)=>{

    try{

      document.getElementById("loadingText")
        .innerText =
          `Processing ${completed + 1} of ${domains.length}: ${domain}`;

      const response =
        await fetch(
          `${API_BASE}/?domain=${encodeURIComponent(domain)}`
        );

      const data =
        await response.json();

      completed++;

      if(data.error){

        renderError(domain, data.error);

        return;

      }

      auditResults.push(data);

      renderTable(data);

      updateDashboard();

      renderChart();

    }catch(err){

      completed++;

      renderError(domain, err.toString());

    }

  });

  await Promise.all(promises);

  document.getElementById("loadingTitle")
    .innerText =
      "Analysis Complete";

  document.getElementById("loadingText")
    .innerText =
      `${auditResults.length} domains audited successfully`;

  setTimeout(()=>{

    loadingBox.style.display = "none";

  },1200);

  loadHistory();

}

function renderError(domain,error){

  const tbody =
    document.querySelector("#resultsTable tbody");

  tbody.innerHTML += `

    <tr>

      <td>
        <strong>${sanitize(domain)}</strong>
      </td>

      <td colspan="5">

        <div style="
          color:#b91c1c;
          font-weight:bold;
        ">
          Failed to analyze domain
        </div>

        <div style="
          margin-top:8px;
          color:#666;
        ">
          ${sanitize(error)}
        </div>

      </td>

    </tr>

  `;

}

function renderTable(data){

  const tbody =
    document.querySelector("#resultsTable tbody");

  const tech =
    data.technicalSEO || {};

  const issues = [];

  if(!data.title){
    issues.push("Missing title tag");
  }

  if(!data.description){
    issues.push("Missing meta description");
  }

  if(!data.h1){
    issues.push("Missing H1 heading");
  }

  if(!tech.canonical){
    issues.push("Missing canonical tag");
  }

  if(!tech.viewport){
    issues.push("Viewport meta missing");
  }

  if(!tech.schemaMarkup){
    issues.push("Schema markup missing");
  }

  if(!tech.robots){
    issues.push("robots.txt missing");
  }

  if(!tech.sitemap){
    issues.push("sitemap.xml missing");
  }

  if(!tech.ogTags){
    issues.push("Open Graph tags missing");
  }

  if(!tech.twitterCards){
    issues.push("Twitter card tags missing");
  }

  if(Number(data.performance || 0) < 50){
    issues.push("Poor page performance");
  }

  if(Number(data.accessibility || 0) < 70){
    issues.push("Accessibility improvements needed");
  }

  if(Number(data.bestPractices || 0) < 70){
    issues.push("Best practices score is low");
  }

  tbody.innerHTML += `

    <tr>

      <td>

        <strong>
          ${sanitize(data.domain)}
        </strong>

      </td>

      <td>

        <div class="
          score-badge
          ${getScoreClass(data.score || 0)}
        ">

          ${getGrade(data.score || 0)}

        </div>

        <div style="
          margin-top:12px;
          font-size:30px;
          font-weight:bold;
        ">
          ${data.score || 0}
        </div>

      </td>

      <td>

        <div class="metric-grid">

          <div class="metric-card">
            <span>Performance</span>
            <strong>${data.performance ?? "-"}</strong>
          </div>

          <div class="metric-card">
            <span>Accessibility</span>
            <strong>${data.accessibility ?? "-"}</strong>
          </div>

          <div class="metric-card">
            <span>Best Practices</span>
            <strong>${data.bestPractices ?? "-"}</strong>
          </div>

          <div class="metric-card">
            <span>SEO</span>
            <strong>${data.seoScore ?? "-"}</strong>
          </div>

        </div>

      </td>

      <td>

        <div class="meta-box">

          <strong>Title:</strong>

          <br>

          ${sanitize(data.title || "Missing")}

          <br><br>

          <strong>Description:</strong>

          <br>

          ${sanitize(data.description || "Missing")}

          <br><br>

          <strong>H1:</strong>

          <br>

          ${sanitize(data.h1 || "Missing")}

        </div>

      </td>

      <td>

        ${
          issues.length > 0
          ?
          `
            <ul class="issues">

              ${issues.map(issue => `
                <li>${sanitize(issue)}</li>
              `).join("")}

            </ul>
          `
          :
          `
            <span style="
              color:#166534;
              font-weight:bold;
            ">
              Excellent Technical SEO
            </span>
          `
        }

      </td>

      <td>

        <div class="recommendation-box">

          ${sanitize(data.ai || "No recommendations")}

        </div>

      </td>

    </tr>

  `;

}

function updateDashboard(){

  const total =
    auditResults.length;

  document.getElementById("totalAudits")
    .innerText = total;

  if(total === 0){

    document.getElementById("avgScore")
      .innerText = 0;

    document.getElementById("bestScore")
      .innerText = 0;

    document.getElementById("avgPerformance")
      .innerText = 0;

    return;

  }

  const scores =
    auditResults.map(r =>
      Number(r.score || 0)
    );

  const performanceScores =
    auditResults.map(r =>
      Number(r.performance || 0)
    );

  const avgScore =
    Math.round(
      scores.reduce((a,b)=>a+b,0)
      / total
    );

  const bestScore =
    Math.max(...scores);

  const avgPerformance =
    Math.round(
      performanceScores.reduce((a,b)=>a+b,0)
      / total
    );

  document.getElementById("avgScore")
    .innerText = avgScore;

  document.getElementById("bestScore")
    .innerText = bestScore;

  document.getElementById("avgPerformance")
    .innerText = avgPerformance;

}

function renderChart(){

  const ctx =
    document.getElementById("scoreChart");

  const labels =
    auditResults.map(r => r.domain);

  const scores =
    auditResults.map(r => r.score);

  if(chartInstance){

    chartInstance.destroy();

  }

  chartInstance = new Chart(ctx, {

    type:"bar",

    data:{
      labels,
      datasets:[{
        label:"SEO Score",
        data:scores,
        borderWidth:1,
        borderRadius:12
      }]
    },

    options:{

      responsive:true,

      maintainAspectRatio:false,

      scales:{
        y:{
          beginAtZero:true,
          max:100
        }
      }

    }

  });

}

function downloadCSV(){

  if(auditResults.length === 0){

    alert("No audit results available");

    return;

  }

  const headers = [

    "Domain",
    "Score",
    "Performance",
    "Accessibility",
    "Best Practices",
    "SEO",
    "AI Analysis"

  ];

  const rows =
    auditResults.map(r => [

      r.domain,
      r.score,
      r.performance,
      r.accessibility,
      r.bestPractices,
      r.seoScore,
      r.ai

    ]);

  let csv =
    headers.join(",") + "\n";

  rows.forEach(row => {

    csv += row.map(v =>
      `"${String(v || "").replace(/"/g,'""')}"`
    ).join(",") + "\n";

  });

  const blob =
    new Blob([csv], {
      type:"text/csv"
    });

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;

  a.download =
    "revenue-clutch-audit-report.csv";

  a.click();

  URL.revokeObjectURL(url);

}

async function downloadPDF(){

  if(auditResults.length === 0){

    alert("No audit results available");

    return;

  }

  const { jsPDF } =
    window.jspdf;

  const doc =
    new jsPDF();

  doc.setFontSize(24);

  doc.text(
    "Revenue Clutch SEO Report",
    20,
    20
  );

  let y = 40;

  auditResults.forEach((r,index)=>{

    doc.setFontSize(16);

    doc.text(
      `${index + 1}. ${r.domain}`,
      20,
      y
    );

    y += 10;

    doc.setFontSize(11);

    doc.text(`SEO Score: ${r.score}`,20,y);
    y += 7;

    doc.text(`Performance: ${r.performance}`,20,y);
    y += 7;

    doc.text(`Accessibility: ${r.accessibility}`,20,y);
    y += 7;

    doc.text(`Best Practices: ${r.bestPractices}`,20,y);
    y += 7;

    doc.text(`SEO: ${r.seoScore}`,20,y);
    y += 7;

    doc.text(`AI Analysis: ${r.ai || ""}`,20,y);
    y += 15;

    if(y > 260){

      doc.addPage();

      y = 20;

    }

  });

  doc.save(
    "revenue-clutch-seo-report.pdf"
  );

}

async function loadHistory(){

  try{

    const response =
      await fetch(
        `${API_BASE}/?history=1`
      );

    const data =
      await response.json();

    const tbody =
      document.querySelector("#historyTable tbody");

    tbody.innerHTML = "";

    data.slice(0,10).forEach(row => {

      tbody.innerHTML += `

        <tr>

          <td>${sanitize(row.domain)}</td>

          <td>${row.score || 0}</td>

          <td>${row.performance || 0}</td>

          <td>${sanitize(row.created_at || "")}</td>

        </tr>

      `;

    });

  }catch(err){

    console.log(err);

  }

}

loadHistory();

</script>
