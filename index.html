<!DOCTYPE html>
<html>
<head>
  <title>Revenue Clutch Audit Engine</title>

  <style>
    body{
      font-family:Arial;
      background:#f5f7fb;
      padding:40px;
    }

    h1{
      font-size:42px;
      margin-bottom:10px;
    }

    textarea{
      width:100%;
      height:180px;
      padding:15px;
      font-size:16px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    button{
      background:black;
      color:white;
      border:none;
      padding:15px 30px;
      margin-top:20px;
      cursor:pointer;
      border-radius:8px;
      font-size:16px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:40px;
      background:white;
    }

    th{
      background:black;
      color:white;
      padding:12px;
      text-align:left;
    }

    td{
      padding:12px;
      border-bottom:1px solid #eee;
    }

    .score-good{
      color:green;
      font-weight:bold;
    }

    .score-mid{
      color:orange;
      font-weight:bold;
    }

    .score-bad{
      color:red;
      font-weight:bold;
    }

    #downloadBtn{
      background:#0a7cff;
      margin-left:10px;
    }
  </style>
</head>

<body>

<h1>Revenue Clutch Audit Engine</h1>

<p>Paste one domain per line:</p>

<textarea id="domains"></textarea>

<br>

<button onclick="analyzeDomains()">
Analyze Domains
</button>

<button id="downloadBtn" onclick="downloadCSV()">
Export CSV
</button>

<table id="resultsTable">

<thead>
<tr>
<th>Domain</th>
<th>Title</th>
<th>Description</th>
<th>H1</th>
<th>Score</th>
<th>AI Analysis</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

let auditResults = [];

async function analyzeDomains(){

  const textarea =
    document.getElementById("domains");

  const domains =
    textarea.value
      .split("\n")
      .map(d => d.trim())
      .filter(Boolean);

  const tbody =
    document.querySelector("#resultsTable tbody");

  tbody.innerHTML = "";

  auditResults = [];

  for(const domain of domains){

    try{

      const response = await fetch(
        "https://audit-api.t-tchdhry-tc.workers.dev/?domain=" + domain
      );

     const text = await response.text();

console.log(text);

const data = JSON.parse(text);

      auditResults.push(data);

      let scoreClass = "score-good";

      if(data.score < 80){
        scoreClass = "score-mid";
      }

      if(data.score < 50){
        scoreClass = "score-bad";
      }

      tbody.innerHTML += `
        <tr>
          <td>${data.domain || ""}</td>
          <td>${data.title || ""}</td>
          <td>${data.description || ""}</td>
          <td>${data.h1 || ""}</td>
          <td class="${scoreClass}">
            ${data.score || ""}
          </td>
          <td>${data.ai || ""}</td>
        </tr>
      `;

    }catch(err){

  console.log(err);

  tbody.innerHTML += `
    <tr>
      <td colspan="6">
        ${err}
      </td>
    </tr>
  `;

}

  }

}

function downloadCSV(){

  if(auditResults.length === 0){
    alert("No results");
    return;
  }

  const headers = [
    "Domain",
    "Title",
    "Description",
    "H1",
    "Score",
    "AI"
  ];

  const rows = auditResults.map(r => [
    r.domain,
    r.title,
    r.description,
    r.h1,
    r.score,
    (r.ai || "").replace(/\n/g, " ")
  ]);

  let csv =
    headers.join(",") + "\n";

  rows.forEach(row => {
    csv += row.map(v =>
      `"${String(v || "").replace(/"/g,'""')}"`
    ).join(",") + "\n";
  });

  const blob =
    new Blob([csv], { type:"text/csv" });

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;

  a.download = "audit-results.csv";

  a.click();

  URL.revokeObjectURL(url);

}

</script>

</body>
</html>
